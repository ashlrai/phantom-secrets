  <text x="482" y="492" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" fill="#4ade80">ok</text><text x="510" y="492" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" fill="#8888a0"> .env rewritten with phantom tokens</text>
  <text x="482" y="520" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" fill="#8888a0">$ </text><text x="500" y="520" font-family="'SF Mono', 'Fira Code', monospace" font-size="16" fill="#e0e0e8">phantom exec -- claude</text>

