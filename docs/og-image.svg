  <circle cx="482" cy="430" r="5" fill="#f87171" opacity="0.8"/>
  <circle cx="498" cy="430" r="5" fill="#fbbf24" opacity="0.8"/>
  <circle cx="514" cy="430" r="5" fill="#4ade80" opacity="0.8"/>
