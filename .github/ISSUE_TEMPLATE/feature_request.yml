name: ✨ Feature request
description: Suggest a new capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation that prompted this request — the *why*, not the *what*.
      placeholder: "When I'm pair-programming with Claude Code in a monorepo, ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like Phantom to do? Concrete CLI flags, MCP tool names, or UX flows are most useful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other tools, manual workarounds, or competing approaches you tried first.
    validations:
      required: false

  - type: dropdown
    id: surface
    attributes:
      label: Which surface?
      multiple: true
      options:
        - CLI command
        - MCP tool
        - Local proxy behavior
        - Cloud sync (phm.dev)
        - Editor integration (Claude Code / Cursor / Windsurf / Codex)
        - Deployment-platform sync (Vercel / Railway / GitHub Actions)
        - Documentation
    validations:
      required: true
